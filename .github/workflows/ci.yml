name: Vanilla CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Lint with Pylint
        run: |
          pip install pylint

      - name: Run tests with coverage
        run: |
          cd api
          pytest
